services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-consultant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-consultant}
      POSTGRES_DB: ${POSTGRES_DB:-consultant}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-consultant} -d ${POSTGRES_DB:-consultant}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  app:
    build: .
    env_file:
      - .env
    environment:
      # В compose приложение ходит к postgres по имени сервиса, а не на localhost.
      DATABASE_URL: postgres://${POSTGRES_USER:-consultant}:${POSTGRES_PASSWORD:-consultant}@postgres:5432/${POSTGRES_DB:-consultant}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  pgdata:
